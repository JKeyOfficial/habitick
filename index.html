<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" type="image/png" href="/habitick-blue-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>HabiTick — Premium Habit Tracker & Journaling App</title>
    <meta name="description" content="Build habits, track daily routines, journal securely with client-side encryption, and level up your life with HabiTick's premium progression system and AI-driven coaching insights." />
    <meta name="keywords" content="habit tracker, premium routine, personal journal, secure journaling, daily routines, habit progression, AI coach, client-side encryption, task manager, level up, HabiTick" />
    <meta name="author" content="HabiTick" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://app.habitick.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.habitick.app/" />
    <meta property="og:title" content="HabiTick — Premium Habit Tracker & Journaling App" />
    <meta property="og:description" content="Track your habits, build daily routines, earn XP, and unlock streak shields. Your data is E2E encrypted client-side, giving you absolute privacy." />
    <meta property="og:image" content="https://app.habitick.app/habitick-blue-logo.png" />
    <meta property="og:site_name" content="HabiTick" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://app.habitick.app/" />
    <meta name="twitter:title" content="HabiTick — Premium Habit Tracker & Journaling App" />
    <meta name="twitter:description" content="Track habits, complete routines, build streaks, and get private client-side encrypted AI coaching summaries." />
    <meta name="twitter:image" content="https://app.habitick.app/habitick-blue-logo.png" />

    <!-- Mobile App Integration (iOS / PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HabiTick" />
    <link rel="apple-touch-icon" href="/habitick-blue-logo.png" />

    <!-- Structured Data (Schema.org / JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "HabiTick",
        "operatingSystem": "All",
        "applicationCategory": "ProductivityApplication",
        "description": "A premium habit tracker, routine builder, and client-side encrypted personal journal that rewards consistency with XP levels and streak shields, powered by AI coaching insights.",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "screenshot": [
          "https://app.habitick.app/screenshot1.png",
          "https://app.habitick.app/screenshot2.png",
          "https://app.habitick.app/screenshot3.png",
          "https://app.habitick.app/screenshot4.png"
        ],
        "author": {
          "@type": "Organization",
          "name": "HabiTick",
          "url": "https://habitick.app"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
